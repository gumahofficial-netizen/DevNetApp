name: Android CI - Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl gradle

      - name: Install Android SDK command line tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          curl -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip /tmp/cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          yes | $HOME/android-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Create Gradle wrapper (if missing)
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper
          fi

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Prepare keystore from secret (optional)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p $HOME/keystores
          echo "$KEYSTORE_BASE64" | base64 --decode > $HOME/keystores/release-keystore.jks
          ls -l $HOME/keystores

      - name: Build Release APK (if keystore provided)
        env:
          KEYSTORE_PATH: $HOME/keystores/release-keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -f "$KEYSTORE_PATH" ]; then
            chmod +x ./gradlew
            ./gradlew :app:assembleRelease -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" -Pandroid.injected.signing.store.password="$STORE_PASSWORD" -Pandroid.injected.signing.key.alias="$KEY_ALIAS" -Pandroid.injected.signing.key.password="$KEY_PASSWORD" --stacktrace
          else
            echo "No keystore provided; skipping release build"
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release and attach APK (if release exists)
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = 'app/build/outputs/apk/release/app-release.apk';
            if (!fs.existsSync(path)) {
              core.info('Release APK not found, skipping GitHub Release creation.');
              return;
            }
            const tag = `v${process.env.GITHUB_RUN_NUMBER}`;
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `Automated release generated by workflow run ${context.runId}`,
              draft: false,
              prerelease: false
            });
            const releaseId = release.data.id;
            core.info(`Created release id=${releaseId}`);
            const fileData = fs.readFileSync(path);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'app-release.apk',
              data: fileData,
              headers: { 'content-type': 'application/vnd.android.package-archive' }
            });
            core.info('Uploaded app-release.apk to release.');
